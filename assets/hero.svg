  <!-- ================= Copy ================= -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, Helvetica, Arial, sans-serif">
    <!-- Eyebrow -->
    <text x="500" y="120" font-size="14" font-weight="600" letter-spacing="4" class="muted">THE  AGENT  SKILL  FOR  INSPIRE</text>

    <!-- Wordmark: two-weight treatment, echoing the platform wordmark next to the mark -->
    <text x="500" y="205" font-size="76" class="fg">
      <tspan font-weight="800" letter-spacing="-2">Inspire</tspan><tspan font-weight="300" letter-spacing="-1" class="fg2">Skill</tspan>
    </text>

    <!-- Tagline -->
    <text x="500" y="250" font-size="22" font-weight="500" class="muted">
      One command. Every Inspire operation. Straight from chat.
    </text>

    <!-- Capability row -->
    <g font-size="15" letter-spacing="1">
      <text x="500" y="292" class="muted">
        <tspan font-weight="600" class="fg2">Notebook</tspan>
        <tspan dx="10">·</tspan>
